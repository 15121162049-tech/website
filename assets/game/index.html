<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇3D</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud" style="display: none;">
            <div style="display: flex; gap: 10px;">
                <button id="pause-btn" onclick="togglePause()">暂停</button>
            </div>
            <div id="distance-display" class="hud-item" style="position: absolute; top: 20px; right: 20px;">
                <div class="hud-label">距离</div>
                <div class="hud-value"><span id="distance-value">0</span>m</div>
            </div>
            <div id="score-display" class="hud-item" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px;">
                <div class="hud-label">得分</div>
                <div class="hud-value"><span id="score-value">0</span></div>
            </div>
            <div id="lives-display" style="position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 1000;">
                <!-- 像素心将通过JavaScript动态添加 -->
            </div>
        </div>


        <div id="pause-screen">
            <div class="pause-title">PAUSED</div>
            <div class="pause-buttons">
                <button class="continue-btn" onclick="togglePause()">继续游戏</button>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0B0C15; pointer-events: auto; z-index: 200;">
            <div style="width: 60px; height: 60px; border: 3px solid rgba(0, 255, 157, 0.3); border-top: 3px solid #00FF9D; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="margin-top: 20px; color: #00FF9D; font-size: 16px; font-weight: 700; letter-spacing: 2px;">加载中...</div>
        </div>

        <div id="start-screen" style="display: none;">
            <div class="screen-title">贪吃蛇3D</div>
            <div class="instructions">
                <span>[A/←]</span> 向左移动 &nbsp;&nbsp; <span>[D/→]</span> 向右移动<br>
                吃🍎苹果得分 &nbsp;&nbsp; 避开💣地雷<br>
                每踩到地雷减少1节身体
            </div>
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>

        <div id="gameover-screen">
            <div class="screen-title">GAME OVER</div>
            <div class="final-score">0</div>
            <div class="high-score">最高分: 0</div>
            <button class="start-btn" onclick="restartGame()">再来一次</button>
        </div>

        <div id="combo-display"></div>

        <!-- 手机端控制按钮 -->
        <div id="mobile-controls">
            <button id="left-btn" class="control-btn">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button id="right-btn" class="control-btn">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/gameState.js"></script>
    <script src="js/audioManager.js"></script>
    <script src="js/three.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/obstacles.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
