        }



        function updateSnake(delta) {
            if (!GameState.isPlaying) return;

            // 计算目标位置
            const targetX = getLaneX(GameState.targetLane);

            // 平滑移动到目标车道
            const diff = targetX - snakeHead.position.x;
            if (Math.abs(diff) > 0.05) {
                snakeHead.position.x += diff * GameConfig.LATERAL_SPEED * delta * 0.3;
                // 移动时的倾斜效果
                snakeHead.rotation.z = -Math.sign(diff) * 0.1 * (Math.abs(diff) / GameConfig.LANE_WIDTH);
            } else {
                snakeHead.position.x = targetX;
                // 回到正常位置
                snakeHead.rotation.z = Math.sin(Date.now() * 0.005) * 0.05;
            }

            // 限制在赛道范围内
            const maxX = getLaneX(GameConfig.MAX_LANES - 1);
            snakeHead.position.x = Math.max(getLaneX(0), Math.min(maxX, snakeHead.position.x));

            // 蛇头上下浮动效果
            snakeHead.position.y = 0.5 + Math.sin(Date.now() * 0.01) * 0.05;

            // 记录路径（蛇头只在X轴移动，Z轴不变）
            pathHistory.unshift({
                x: snakeHead.position.x,
                y: snakeHead.position.y,
                z: 0  // 固定Z位置
            });

            if (pathHistory.length > MAX_PATH_HISTORY) {
                pathHistory.pop();
            }

            // 更新蛇身跟随
            for (let i = 0; i < snakeBody.length; i++) {
                const pathIndex = Math.floor((i + 1) * 3); // 减小路径点间隔，使跟随更紧凑
                if (pathIndex < pathHistory.length) {
                    const pos = pathHistory[pathIndex];
                    const segment = snakeBody[i];
                    segment.position.x += (pos.x - segment.position.x) * 0.8; // 增大平滑因子，使跟随更直接
                    segment.position.y += (pos.y - segment.position.y) * 0.8; // 增大平滑因子，使跟随更直接
                    // 蛇身Z轴保持相对位置
                    segment.position.z = (i + 1) * GameConfig.SEGMENT_SPACING;
                    
                    // 蛇身跟随的摆动效果
                    segment.rotation.z = Math.sin(Date.now() * 0.003 + i * 0.1) * 0.02; // 减小摆动幅度，使动作更平缓
                }
            }
        }

        function updateTrackAndObstacles(delta) {
            const moveDistance = GameState.speed * delta;

            // 更新距离
            GameState.distance += moveDistance;
            GameState.speed += GameConfig.SPEED_INCREMENT * delta;

            // 更新赛道（两组交替，无缝循环）
            const segmentDepth = GameConfig.TRACK_LENGTH / 2;
            for (let i = 0; i < trackParts.length; i++) {
                const part = trackParts[i];
                part.position.z += moveDistance; // 向后移动，z值增加

                // 如果跑到了后面，重置到前面，确保在相机视野外重置
                if (part.position.z > segmentDepth) { // 当赛道段移动完一段长度后
                    // 重置到赛道的最前面，与另一段赛道首尾相接
                    part.position.z -= segmentDepth * 2;
                }
            }



            // 更新树木（向后移动并循环）
            for (let t = 0; t < trees.length; t++) {
                trees[t].position.z += moveDistance; // 向后移动，z值增加
                if (trees[t].position.z > segmentDepth + 100) { // 当树木移动完一段长度后
                    trees[t].position.z -= segmentDepth * 2 + 100;
                    // 重新随机位置，保持紧贴车道边缘
                    trees[t].position.x = (Math.random() > 0.5 ? 1 : -1) * (9.8 + Math.random() * 0.2);
                    trees[t].rotation.y = Math.random() * Math.PI * 2;
                }
            }

            // 更新小草（向后移动并循环）
            for (let g = 0; g < grass.length; g++) {
                const grassGroup = grass[g];
                grassGroup.position.z += moveDistance; // 向后移动，z值增加
                if (grassGroup.position.z > segmentDepth) { // 当小草移动完一段长度后
                    grassGroup.position.z -= segmentDepth * 2;
                }
            }

            // 更新苹果（向后移动）
            for (let i = apples.length - 1; i >= 0; i--) {
                const apple = apples[i];
                const oldPosition = apple.position.clone();
                apple.position.z += moveDistance; // 向后移动，z值增加
                apple.rotation.y += apple.userData.rotationSpeed;
                apple.rotation.x += apple.userData.rotationSpeed * 0.5;

                // 简化碰撞检测，提高性能
                const xDistance = Math.abs(snakeHead.position.x - apple.position.x);
                const zDistance = Math.abs(snakeHead.position.z - apple.position.z);
                
                // 简化的碰撞检测条件
                if (xDistance < 1.5 && zDistance < 1.5) {
                    // 吃掉苹果
                    collectApple(apple);
                    apples.splice(i, 1);
                    continue;
                }

                // 移除过远的苹果
                if (apple.position.z > 150) {
                    scene.remove(apple);
                    apples.splice(i, 1);
                }
            }

            // 更新地雷（向后移动）
            for (let i = mines.length - 1; i >= 0; i--) {
                const mine = mines[i];
                const oldPosition = mine.position.clone();
                mine.position.z += moveDistance; // 向后移动，z值增加



                // 简化碰撞检测，提高性能
                const xDistance = Math.abs(snakeHead.position.x - mine.position.x);
                const zDistance = Math.abs(snakeHead.position.z - mine.position.z);
                
                // 简化的碰撞检测条件
                if (!GameState.isInvulnerable && xDistance < 1.5 && zDistance < 1.5) {
                    // 撞到地雷
                    hitMine(mine);
                    mines.splice(i, 1);
                    continue;
                }

                // 移除过远的地雷
                if (mine.position.z > 150) {
                    scene.remove(mine);
                    mines.splice(i, 1);
                }
            }


        }

        function hitMine(mine) {
            GameState.snakeLength--;

            // 播放碰撞音效
            AudioManager.playHitSound();

            // 屏幕震动 - 只让游戏画布晃动，不影响HUD
            document.getElementById('gameCanvas').classList.add('shake');
            setTimeout(() => {
                document.getElementById('gameCanvas').classList.remove('shake');
            }, 500);

            // 移除地雷
            scene.remove(mine);

            // 减弱的爆炸效果，只有棕色碎片
            const particleCount = 10;
            const particles = [];
            const brownColor = 0x8B4513; // 棕色

            for (let i = 0; i < particleCount; i++) {
                const particle = getParticle();
                particle.position.copy(mine.position);
                particle.material.color.setHex(brownColor);
                particle.material.opacity = 1;
                particle.rotation.set(0, 0, 0);
                
                // 随机大小
                const size = 0.1 + Math.random() * 0.15;
                particle.scale.set(size, size, size);
                
                // 减弱的爆炸速度，确保粒子远离镜头
                const speed = 0.4 + Math.random() * 0.2;
                particle.userData.velocity.set(
                    (Math.random() - 0.5) * speed,
                    Math.random() * 0.2 + 0.1,
                    Math.random() * 0.5 * speed + 0.1
                );
                particle.userData.life = 1;
                scene.add(particle);
                particles.push(particle);
            }

            // 动画粒子
            function animateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.015; // 重力
                    p.userData.life -= 0.025;
                    p.material.opacity = p.userData.life;
                    p.rotation.x += 0.1;
                    p.rotation.y += 0.1;
                    p.rotation.z += 0.05;
                    
                    // 大小变化
                    const scale = p.userData.life * 0.8 + 0.2;
                    p.scale.set(scale, scale, scale);

                    if (p.userData.life <= 0) {
                        returnParticle(p);
                        particles.splice(i, 1);
                    }
                }

                if (particles.length > 0) {
                    requestAnimationFrame(animateParticles);
                }
            }
            animateParticles();

            // 减少蛇身 - 添加破碎动效
            if (snakeBody.length > 0) {
                const removedSegment = snakeBody.pop();
                // 创建破碎粒子效果
                createBlockDestruction(removedSegment.position);
                scene.remove(removedSegment);
            }

            // 无敌时间
            GameState.isInvulnerable = true;
            setTimeout(() => {
                GameState.isInvulnerable = false;
            }, GameConfig.INVULNERABILITY_TIME);

            // 闪烁效果
            flashSnake();

            // 更新底部的像素心显示
            updateLivesDisplay();
            updateHUD();

            // 检查游戏结束
            if (GameState.snakeLength <= 0) {
                gameOver();
            }
        }

        function flashSnake() {
            let flashCount = 0;
            const flashInterval = setInterval(() => {
                // 闪烁蛇头的所有子对象
                snakeHead.children.forEach(child => {
                    if (child.material && child.material.opacity !== undefined) {
                        child.material.opacity = flashCount % 2 === 0 ? 0.5 : 1;
                    }
                });
                // 闪烁蛇身
                snakeBody.forEach(segment => {
                    if (segment.material && segment.material.opacity !== undefined) {
                        segment.material.opacity = flashCount % 2 === 0 ? 0.5 : 1;
                    }
                });
                flashCount++;
                if (flashCount >= 6) {
                    clearInterval(flashInterval);
                    // 恢复蛇头的所有子对象的透明度
                    snakeHead.children.forEach(child => {
                        if (child.material && child.material.opacity !== undefined) {
                            child.material.opacity = 1;
                        }
                    });
                    // 恢复蛇身的透明度
                    snakeBody.forEach(segment => {
                        if (segment.material && segment.material.opacity !== undefined) {
                            segment.material.opacity = 1;
                        }
                    });
                }
            }, 80);
        }

        // 蛇块破碎动效
        function createBlockDestruction(position) {
            const particleCount = 8;
            const particles = [];

            for (let i = 0; i < particleCount; i++) {
                // 创建不规则碎片

                particle.position.z += (Math.random() - 0.5) * 0.5;
                particle.material.color.setHex(blockColor);
                particle.material.opacity = 1;
                particle.rotation.set(0, 0, 0);
                
                const size = 0.15 + Math.random() * 0.15;
                particle.scale.set(size, size, size);

                particle.userData.velocity.set(
                    (Math.random() - 0.5) * 0.4,
                    Math.random() * 0.3 + 0.1,
                    (Math.random() - 0.5) * 0.4
                );
                particle.userData.rotationSpeed.set(
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3
                );
                particle.userData.life = 1;
                scene.add(particle);
                particles.push(particle);
            }

            // 动画碎片
            function animateFragments() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.015; // 重力
                    p.rotation.x += p.userData.rotationSpeed.x;
                    p.rotation.y += p.userData.rotationSpeed.y;
                    p.rotation.z += p.userData.rotationSpeed.z;
                    p.userData.life -= 0.025;
                    p.material.opacity = p.userData.life;
                    p.material.color.setHex(p.userData.life > 0.5 ? blockColor : 0xFF0000); // 渐变红色

                    if (p.userData.life <= 0) {
                        returnParticle(p);
                        particles.splice(i, 1);
                    }
                }

                if (particles.length > 0) {
                    requestAnimationFrame(animateFragments);
                }
            }
            animateFragments();
        }

        function setSnakeShape(shape) {
            GameState.snakeShape = shape;
            // 如果游戏正在运行，更新蛇身形状
            if (GameState.isPlaying) {
                updateSnakeSkin();
            }
        }

        function setSnakeHead(headType) {
            GameState.snakeHead = headType;
            // 如果游戏正在运行，更新蛇头
            if (GameState.isPlaying) {
                updateSnakeSkin();
            }
        }

        function setSnakeColor(color) {
            GameState.snakeColor = color;
            // 如果游戏正在运行，更新蛇身颜色
            if (GameState.isPlaying) {
                updateSnakeSkin();
            }
        }

        function updateSkinButtons() {
            // 更新形状按钮状态
            const shapeButtons = ['cube', 'diamond', 'sphere'];
            shapeButtons.forEach(shape => {
                const button = document.getElementById(`shape-${shape}`);
                if (button) {
                    if (GameState.snakeShape === shape) {
                        button.style.backgroundColor = 'rgba(0, 255, 157, 0.3)';
                        button.style.boxShadow = '0 0 10px rgba(0, 255, 157, 0.5)';
                    } else {
                        button.style.backgroundColor = 'rgba(0, 255, 157, 0.1)';
                        button.style.boxShadow = 'none';
                    }
                }
            });
            
            // 更新颜色按钮状态
            updateColorButtons();
        }
        
        function updateColorButtons() {
            // 更新颜色按钮状态
            const colorButtons = ['#00FF9D', '#FF2A6D', '#FF9E00', '#3E4C84', '#DA70D6', '#87CEEB'];
            colorButtons.forEach(color => {
                const button = document.getElementById(`color-${color.replace('#', '')}`);
                if (button) {
                    if (GameState.snakeColor === color) {
                        button.style.boxShadow = '0 0 10px #00FF9D';
                    } else {
                        button.style.boxShadow = 'none';
                    }
                }
            });
        }

        function updateSnakeSkin() {
            // 移除旧的蛇身
            if (snakeHead) {
                scene.remove(snakeHead);
            }
            snakeBody.forEach(segment => {
                scene.remove(segment);
            });
            snakeBody = [];
            
            // 重新创建蛇
            createSnake();
            
            // 根据当前生命值调整蛇身长度
            while (snakeBody.length < GameState.snakeLength - 1) {
                // 添加蛇身段
                createBodySegment(snakeBody.length);
            }
            
            while (snakeBody.length > GameState.snakeLength - 1) {
                // 移除多余的蛇身段
                const segment = snakeBody.pop();
                scene.remove(segment);
            }
        }

        function endGame() {
            // 停止游戏
            GameState.isPlaying = false;
            
            // 停止音乐
            if (AudioManager.bgMusic) AudioManager.bgMusic.stop();
            
            // 隐藏设置弹窗
            const settingsScreen = document.getElementById('settings-screen');
            settingsScreen.style.display = 'none';
            
            // 显示初始页面
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('settings-btn').style.display = 'none';
            
            // 重置游戏状态
            GameState.score = 0;
            GameState.distance = 0;
            GameState.speed = GameConfig.SNAKE_SPEED;
            GameState.snakeLength = GameConfig.INITIAL_SNAKE_LENGTH;
            GameState.appleCount = 0;
            GameState.targetLane = 1;
            GameState.isInvulnerable = false;
            GameState.currentSeason = 'spring';
            GameState.nextSeason = 'summer';
            GameState.seasonProgress = 0;
            GameState.seasonTime = 0;
            GameState.isTransitioning = false;
            GameState.transitionProgress = 0;
            GameState.currentGrassColor = GRASS_COLORS[GameState.currentSeason];
        }

        function togglePause() {
            if (!GameState.isPlaying) return;

            GameState.isPaused = !GameState.isPaused;

            if (GameState.isPaused) {
                document.getElementById('pause-screen').style.display = 'flex';
                // 隐藏左上角暂停按钮
                document.getElementById('pause-btn').style.display = 'none';
                document.getElementById('settings-btn').style.display = 'none';
                // 隐藏手机控制按钮
                document.getElementById('mobile-controls').style.display = 'none';
                // 暂停音乐
                if (AudioManager.bgMusic) AudioManager.bgMusic.stop();
            } else {
                document.getElementById('pause-screen').style.display = 'none';
                // 显示左上角暂停按钮
                document.getElementById('pause-btn').style.display = 'block';
                document.getElementById('settings-btn').style.display = 'block';
                document.getElementById('pause-btn').textContent = '暂停';
                // 继续显示手机控制按钮
                document.getElementById('mobile-controls').style.display = 'flex';
                // 继续播放音乐
                if (AudioManager.bgMusic && GameState.soundEnabled) AudioManager.bgMusic.play();
            }
        }

        function onKeyDown(event) {
            if (!GameState.isPlaying) {
                if (event.code === 'Space') {
                    if (document.getElementById('gameover-screen').style.display === 'flex') {
                        restartGame();
                    } else if (document.getElementById('start-screen').style.display !== 'none') {
                        startGame();
                    }
                }
                return;
            }

            if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
                if (!keys.left) {
                    keys.left = true;
                    moveLeft();
                }
            }
            if (event.code === 'ArrowRight' || event.code === 'KeyD') {
                if (!keys.right) {
                    keys.right = true;
                    moveRight();
                }
            }
            if (event.code === 'Escape' || event.code === 'KeyP' || event.code === 'Space') {
                if (GameState.isPlaying) {
                    togglePause();
                }
            }
        }

        function onKeyUp(event) {
            if (event.code === 'ArrowLeft' || event.code === 'KeyA') {
                keys.left = false;
            }
            if (event.code === 'ArrowRight' || event.code === 'KeyD') {
                keys.right = false;
            }
        }

        function gameOver() {
            GameState.isPlaying = false;

            // 隐藏手机控制按钮
            document.getElementById('mobile-controls').style.display = 'none';
            // 隐藏暂停按钮
            document.getElementById('pause-btn').style.display = 'none';

            // 停止音乐
            if (AudioManager.bgMusic) AudioManager.bgMusic.stop();

            // 更新最高分
            if (GameState.score > GameState.highScore) {
                GameState.highScore = GameState.score;
                localStorage.setItem('snakeRushHighScore', GameState.highScore);
            }

            document.getElementById('gameover-screen').style.display = 'flex';
            document.querySelector('.final-score').textContent = GameState.score;
            document.querySelector('.final-distance').textContent = '距离: ' + Math.floor(GameState.distance) + 'm';
            document.querySelector('.high-score').textContent = '最高分: ' + GameState.highScore;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 帧率控制变量
        let lastTime = 0;
        const MAX_FPS = 60;
        const MIN_FRAME_TIME = 1000 / MAX_FPS;
        
        // 性能监控变量
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let fps = 0;

        function animate(timestamp) {
            // 帧率控制
            if (!lastTime) lastTime = timestamp;
            const elapsed = timestamp - lastTime;
            
            const delta = elapsed / 1000; // 转换为秒
            
            // 帧率计算
            frameCount++;
            if (timestamp - lastFpsUpdate >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsUpdate = timestamp;
                
                // 更新性能监控面板
                updatePerformanceMonitor();
            }

            if (GameState.isPlaying && !GameState.isPaused) {
                updateSnake(delta);
                updateTrackAndObstacles(delta);
                spawnObstacles(clock.getElapsedTime());
                // 只在游戏进行时更新HUD
                updateHUD();
                // 更新季节状态
                updateSeason(delta);
                // 创建季节性粒子效果
                if (Math.random() < 0.3) { // 减少创建频率
                    createSeasonalParticles();
                }
                // 更新粒子状态
                updateParticles(delta);
            }

            // 始终渲染场景，确保能看到赛道和蛇的初始状态
            renderer.render(scene, camera);
            
            // 帧率控制 - 只限制最大帧率，不跳过逻辑
            if (elapsed < MIN_FRAME_TIME) {
                setTimeout(() => requestAnimationFrame(animate), MIN_FRAME_TIME - elapsed);
            } else {
                lastTime = timestamp;
                requestAnimationFrame(animate);
            }
        }

        // 更新性能监控面板
        function updatePerformanceMonitor() {
            // 更新帧率
            document.getElementById('fps-counter').textContent = fps;
            
            // 更新粒子数
            document.getElementById('particle-counter').textContent = particles.length;
            
            // 更新内存使用情况（如果支持）
            if (performance && performance.memory) {
                const memoryMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1);
                document.getElementById('memory-counter').textContent = memoryMB;
            }
        }

        // 全局函数定义
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('pause-btn').textContent = '暂停';
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('settings-btn').style.display = 'block';
            document.getElementById('mobile-controls').style.display = 'flex';

            GameState.isPlaying = true;
            GameState.isPaused = false;
            GameState.score = 0;
            GameState.distance = 0;
            GameState.speed = GameConfig.SNAKE_SPEED;
            GameState.snakeLength = GameConfig.INITIAL_SNAKE_LENGTH;
            GameState.appleCount = 0;
            GameState.targetLane = 1;
            GameState.isInvulnerable = false;
            // 重置季节状态，确保每次重新游戏都从春天开始
            GameState.currentSeason = 'spring';
            GameState.nextSeason = 'summer';
            GameState.seasonProgress = 0;
            GameState.seasonTime = 0;
            GameState.isTransitioning = false;
            GameState.transitionProgress = 0;
            // 初始化草地颜色
            GameState.currentGrassColor = GRASS_COLORS[GameState.currentSeason];

            // 播放背景音乐
            if (AudioManager.bgMusic && GameState.soundEnabled) AudioManager.bgMusic.play();

            // 重置蛇位置 - 保持当前X位置，让updateSnake函数平滑过渡到目标车道
            snakeHead.position.set(snakeHead.position.x, 0.5, 0);
            pathHistory = [];
            
            // 初始化路径历史，确保蛇身跟随正常
            for (let i = 0; i < 50; i++) {
                pathHistory.unshift({
                    x: snakeHead.position.x,
                    y: snakeHead.position.y,
                    z: 0
                });
            }

            // 重置赛道位置
            const segmentDepth = GameConfig.TRACK_LENGTH / 2;
            for (let seg = 0; seg < 2; seg++) {
                let baseIndex = seg * 11; // 每个赛道段有11个元素：4车道 + 2草地过渡 + 3中间车道线 + 2宽车道线
                // 4条车道
                for (let lane = 0; lane < 4; lane++) {
                    trackParts[baseIndex + lane].position.z = -seg * segmentDepth;
                }
                // 2个草地过渡区域
                for (let i = 0; i < 2; i++) {
                    trackParts[baseIndex + 4 + i].position.z = -seg * segmentDepth;
                }
                // 3条中间车道线
                for (let i = 0; i < 3; i++) {
                    trackParts[baseIndex + 6 + i].position.z = -seg * segmentDepth;
                }
                // 2条宽车道线
                for (let i = 0; i < 2; i++) {
                    trackParts[baseIndex + 9 + i].position.z = -seg * segmentDepth;
                }
            }

            // 重置护栏
            for (let r = 0; r < railings.length; r++) {
                railings[r].position.z = 0;
            }

            // 清除现有障碍物
            apples.forEach(a => scene.remove(a));
            mines.forEach(m => scene.remove(m));
            apples = [];
            mines = [];

            // 重新创建蛇身
            snakeBody.forEach(s => {
                scene.remove(s);
                // 释放材质和几何体
                if (s.material) {
                    s.material.dispose();
                }
                if (s.geometry) {
                    s.geometry.dispose();
                }
            });
            snakeBody = [];
            for (let i = 0; i < GameConfig.INITIAL_SNAKE_LENGTH - 1; i++) {
                createBodySegment(i);
            }

            // 重置生成计时器
            lastSpawnTime = 0;
            // 重置时钟
            clock.reset();

            // 重置树木，确保从春季开始
            for (let tree of trees) {
                scene.remove(tree);
            }
            trees = [];
            createTrees();

            // 重置粒子效果
            resetParticleSystem();

            // 初始化像素心显示
            updateLivesDisplay();
            updateHUD();
        }
        
        function restartGame() {
            startGame();
        }
        
        // 暴露到全局作用域
        window.startGame = startGame;
        window.restartGame = restartGame;

        // 启动游戏
        init();
    </script>
