<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000000;
            font-family: 'Orbitron', sans-serif;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        #pause-btn, #settings-btn {
            background: linear-gradient(135deg, rgba(255, 158, 0, 0.15) 0%, rgba(255, 100, 0, 0.1) 100%);
            border: 2px solid #FF9E00;
            border-radius: 12px;
            padding: 8px 20px;
            color: #FF9E00;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #FF9E00;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: auto;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pause-btn:hover, #settings-btn:hover {
            background: linear-gradient(135deg, rgba(255, 158, 0, 0.3) 0%, rgba(255, 100, 0, 0.2) 100%);
            transform: scale(1.05);
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 255, 157, 0.2);
            transition: .4s;
            border-radius: 34px;
            border: 2px solid #00FF9D;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: #00FF9D;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(0, 255, 157, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        #pause-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 12, 21, 0.9);
            pointer-events: auto;
            z-index: 150;
        }

        .pause-title {
            font-size: 48px;
            font-weight: 900;
            color: #FF9E00;
            text-shadow: 0 0 20px #FF9E00, 0 0 40px #FF9E00;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #FF2A6D 0%, #cc1f54 100%);
            border: none;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #FF2A6D, 0 0 40px rgba(255, 42, 109, 0.3);
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #FF2A6D, 0 0 60px rgba(255, 42, 109, 0.5);
        }

        .continue-btn {
            background: linear-gradient(135deg, #00FF9D 0%, #00CC7A 100%);
            border: none;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #0B0C15;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #00FF9D, 0 0 40px rgba(0, 255, 157, 0.3);
        }

        .continue-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00FF9D, 0 0 60px rgba(0, 255, 157, 0.5);
        }

        .hud-item {
            background: linear-gradient(135deg, rgba(0, 255, 157, 0.15) 0%, rgba(0, 204, 122, 0.1) 100%);
            border: 2px solid #00FF9D;
            border-radius: 12px;
            padding: 8px 20px;
            color: #00FF9D;
            text-shadow: 0 0 10px #00FF9D, 0 0 20px #00FF9D;
            backdrop-filter: blur(10px);
            min-width: 120px;
            width: 120px;
            box-sizing: border-box;
            text-align: center;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        #score-display {
            width: 200px;
        }
        
        #distance-display {
            width: 120px;
        }
        
        /* 像素方块样式 */
        .pixel-square {
            width: 20px;
            height: 20px;
            background-color: #FF2A6D;
            position: relative;
            transform: rotate(45deg);
            margin: 0 8px;
            box-shadow: 0 0 8px #FF2A6D, 0 0 16px rgba(255, 42, 109, 0.5);
        }
        
        .pixel-square.square-empty {
            background-color: transparent;
            border: 2px solid #FF2A6D;
            box-shadow: 0 0 8px #FF2A6D, 0 0 16px rgba(255, 42, 109, 0.5);
        }
        
        /* 生命值数值样式 */
        .lives-value {
            color: #FF2A6D;
            font-size: 14px;
            font-weight: 900;
            text-shadow: 0 0 8px #FF2A6D, 0 0 16px rgba(255, 42, 109, 0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            line-height: 1;
            z-index: 1001;
        }

        .hud-label {
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: 900;
        }

        #score-display .hud-value {
            font-size: 20px;
        }

        #score-value {
            color: #FF2A6D;
            text-shadow: 0 0 10px #FF2A6D, 0 0 20px #FF2A6D;
        }

        #health-value {
            color: #00FF9D;
            text-shadow: 0 0 10px #00FF9D, 0 0 20px #00FF9D;
        }

        #distance-display {
            text-align: center;
        }

        #distance-value {
            font-size: 18px;
            color: #3E4C84;
            text-shadow: 0 0 10px #3E4C84;
        }

        #start-screen, #gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 12, 21, 0.9);
            pointer-events: auto;
        }

        .screen-title {
            font-size: 48px;
            font-weight: 900;
            color: #00FF9D;
            text-shadow: 0 0 20px #00FF9D, 0 0 40px #00FF9D, 0 0 60px #00FF9D;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .screen-subtitle {
            font-size: 16px;
            color: #FF2A6D;
            text-shadow: 0 0 10px #FF2A6D;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .instructions {
            color: #3E4C84;
            font-size: 12px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 2;
        }

        .instructions span {
            color: #00FF9D;
            text-shadow: 0 0 5px #00FF9D;
        }

        .start-btn {
            background: linear-gradient(135deg, #00FF9D 0%, #00CC7A 100%);
            border: none;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #0B0C15;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #00FF9D, 0 0 40px rgba(0, 255, 157, 0.3);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00FF9D, 0 0 60px rgba(0, 255, 157, 0.5);
        }

        #gameover-screen {
            display: none;
        }

        .final-score {
            font-size: 64px;
            font-weight: 900;
            color: #FF2A6D;
            text-shadow: 0 0 20px #FF2A6D, 0 0 40px #FF2A6D;
            margin-bottom: 10px;
        }

        .final-distance {
            font-size: 24px;
            color: #00FF9D;
            text-shadow: 0 0 10px #00FF9D;
            margin-bottom: 10px;
        }

        .high-score {
            font-size: 16px;
            color: #00FF9D;
            text-shadow: 0 0 10px #00FF9D;
            margin-bottom: 40px;
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes snake-head {
            0% { transform: translate(-50%, -50%) translate(30px, 0) rotate(0deg); }
            25% { transform: translate(-50%, -50%) translate(0, -30px) rotate(90deg); }
            50% { transform: translate(-50%, -50%) translate(-30px, 0) rotate(180deg); }
            75% { transform: translate(-50%, -50%) translate(0, 30px) rotate(270deg); }
            100% { transform: translate(-50%, -50%) translate(30px, 0) rotate(360deg); }
        }

        @keyframes snake-body-1 {
            0% { transform: translate(-50%, -50%) translate(20px, 0) rotate(0deg); opacity: 1; }
            25% { transform: translate(-50%, -50%) translate(0, -20px) rotate(90deg); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) translate(-20px, 0) rotate(180deg); opacity: 0.6; }
            75% { transform: translate(-50%, -50%) translate(0, 20px) rotate(270deg); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) translate(20px, 0) rotate(360deg); opacity: 1; }
        }

        @keyframes snake-body-2 {
            0% { transform: translate(-50%, -50%) translate(15px, 0) rotate(0deg); opacity: 0.8; }
            25% { transform: translate(-50%, -50%) translate(0, -15px) rotate(90deg); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) translate(-15px, 0) rotate(180deg); opacity: 0.4; }
            75% { transform: translate(-50%, -50%) translate(0, 15px) rotate(270deg); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) translate(15px, 0) rotate(360deg); opacity: 0.8; }
        }

        @keyframes snake-body-3 {
            0% { transform: translate(-50%, -50%) translate(10px, 0) rotate(0deg); opacity: 0.6; }
            25% { transform: translate(-50%, -50%) translate(0, -10px) rotate(90deg); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) translate(-10px, 0) rotate(180deg); opacity: 0.2; }
            75% { transform: translate(-50%, -50%) translate(0, 10px) rotate(270deg); opacity: 0.1; }
            100% { transform: translate(-50%, -50%) translate(10px, 0) rotate(360deg); opacity: 0.6; }
        }

        @keyframes snake-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateX(40px) rotate(0deg); opacity: 1; }
            25% { transform: translate(-50%, -50%) rotate(90deg) translateX(40px) rotate(-90deg); opacity: 1; }
            50% { transform: translate(-50%, -50%) rotate(180deg) translateX(40px) rotate(-180deg); opacity: 1; }
            75% { transform: translate(-50%, -50%) rotate(270deg) translateX(40px) rotate(-270deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateX(40px) rotate(-360deg); opacity: 1; }
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* 新的加载动画样式 */
        .loading-229 {
            width: 85px;
            height: 35px;
            --g1: conic-gradient(from 90deg at 3px 3px, #0000 90deg, #00FF9D 0);
            --g2: conic-gradient(from -90deg at 22px 22px, #0000 90deg, #00FF9D 0);
            background: var(--g1), var(--g1), var(--g1), var(--g2), var(--g2), var(--g2);
            background-size: 25px 25px;
            background-repeat: no-repeat;
            animation: loading-229 1s infinite alternate;
        }

        @keyframes loading-229 {
            0% {
                background-position: 0 50%, 50% 50%, 100% 50%;
            }
            20% {
                background-position: 0 0, 50% 50%, 100% 50%;
            }
            40% {
                background-position: 0 100%, 50% 0, 100% 50%;
            }
            60% {
                background-position: 0 50%, 50% 100%, 100% 0;
            }
            80% {
                background-position: 0 50%, 50% 50%, 100% 100%;
            }
            100% {
                background-position: 0 50%, 50% 50%, 100% 50%;
            }
        }

        #combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            color: #FF9E00;
            text-shadow: 0 0 20px #FF9E00, 0 0 40px #FF9E00;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 手机端控制按钮 */
        #mobile-controls {
            position: absolute;
            bottom: 130px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: auto;
            z-index: 200;
        }

        .control-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 157, 0.2);
            border: 3px solid #00FF9D;
            border-radius: 50%;
            color: #00FF9D;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            pointer-events: auto;
        }

        .control-btn:active {
            background: rgba(0, 255, 157, 0.5);
            transform: scale(0.9);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        /* 媒体查询 - 移动设备适配 */
        @media (max-width: 768px) {
            #mobile-controls {
                display: none;
            }
            
            #hud {
                flex-direction: column;
                align-items: flex-start;
            }
            
            #stats-container {
                position: relative;
                top: 10px;
                right: 0;
                flex-direction: row;
                gap: 10px;
            }
            
            .hud-item {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .hud-value {
                font-size: 18px;
            }
            
            #score-display .hud-value {
                font-size: 16px;
            }
            
            #distance-value {
                font-size: 14px;
            }
            
            .screen-title {
                font-size: 36px;
            }
            
            .screen-subtitle {
                font-size: 14px;
            }
            
            .instructions {
                font-size: 10px;
                padding: 0 20px;
            }
            
            .start-btn,
            .restart-btn,
            .continue-btn {
                padding: 14px 40px;
                font-size: 16px;
            }
            
            /* 设置弹窗响应式样式 */
            #settings-screen {
                width: 95%;
                max-width: 280px;
                padding: 20px;
            }
            
            #settings-screen h2 {
                font-size: 18px;
            }
            
            #settings-screen button[onclick="closeSettings()"] {
                font-size: 20px;
            }
            
            #settings-screen .switch {
                width: 45px;
                height: 24px;
            }
            
            #settings-screen .slider:before {
                height: 16px;
                width: 16px;
                left: 2px;
                bottom: 2px;
            }
            
            #settings-screen input:checked + .slider:before {
                transform: translateX(21px);
            }
            
            #settings-screen .skin-btn {
                padding: 5px;
                font-size: 11px;
            }
            
            #settings-screen .color-btn {
                width: 30px;
                height: 30px;
            }
            
            #settings-screen button[onclick="endGame()"] {
                padding: 8px 25px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud">
            <!-- 顶部控制栏 -->
            <div style="position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200;">
                <button id="pause-btn" onclick="togglePause()">暂停</button>
                <div id="score-distance-display" style="height: 44px; display: flex; flex-direction: column; justify-content: center; padding: 0 20px; color: #00FF9D; text-shadow: 0 0 10px #00FF9D, 0 0 20px #00FF9D; backdrop-filter: blur(10px); min-width: 200px; width: auto; white-space: nowrap;">
                    <div style="font-size: 20px; font-weight: 900;"><span id="distance-value">0</span>m / <span id="score-value">0</span>分</div>
                </div>
                <button id="settings-btn" onclick="toggleSettings()">设置</button>
            </div>
            <!-- 生命值显示 -->
            <div id="lives-display" style="position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 1000;">
                <!-- 像素心将通过JavaScript动态添加 -->
            </div>
        </div>

        <div id="settings-screen" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 300px; padding: 25px; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(11, 12, 21, 0.95); border-radius: 12px; box-shadow: 0 0 30px rgba(0, 255, 157, 0.3); pointer-events: auto; z-index: 150;">
            <div style="position: relative; width: 100%; margin-bottom: 15px; display: flex; justify-content: center;">
                <h2 style="color: white; font-size: 20px; font-weight: 700; margin: 0; text-shadow: none;">设置</h2>
                <button onclick="closeSettings()" style="position: absolute; top: -10px; right: -10px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; line-height: 1;">×</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 15px; margin: 15px 0; width: 100%; max-width: 280px;">
                <!-- 换肤选项 -->
                <div style="width: 100%;">
                    <span style="color: #00FF9D; font-size: 14px; display: block; margin-bottom: 8px;">形状</span>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="setSnakeShape('cube'); updateSkinButtons()" id="shape-cube" class="skin-btn" style="flex: 1; padding: 6px; border: 2px solid #00FF9D; border-radius: 6px; background: rgba(0, 255, 157, 0.1); color: #00FF9D; cursor: pointer; font-size: 12px;">方块</button>
                        <button onclick="setSnakeShape('diamond'); updateSkinButtons()" id="shape-diamond" class="skin-btn" style="flex: 1; padding: 6px; border: 2px solid #00FF9D; border-radius: 6px; background: rgba(0, 255, 157, 0.1); color: #00FF9D; cursor: pointer; font-size: 12px;">菱形</button>
                        <button onclick="setSnakeShape('sphere'); updateSkinButtons()" id="shape-sphere" class="skin-btn" style="flex: 1; padding: 6px; border: 2px solid #00FF9D; border-radius: 6px; background: rgba(0, 255, 157, 0.1); color: #00FF9D; cursor: pointer; font-size: 12px;">球体</button>
                    </div>
                </div>
                
                <div style="width: 100%;">
                    <span style="color: #00FF9D; font-size: 14px; display: block; margin-bottom: 8px;">颜色</span>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="setSnakeColor('#00FF9D'); updateColorButtons()" id="color-00FF9D" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #00FF9D; cursor: pointer; box-shadow: 0 0 10px #00FF9D;"></button>
                        <button onclick="setSnakeColor('#FF2A6D'); updateColorButtons()" id="color-FF2A6D" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #FF2A6D; cursor: pointer;"></button>
                        <button onclick="setSnakeColor('#FF9E00'); updateColorButtons()" id="color-FF9E00" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #FF9E00; cursor: pointer;"></button>
                        <button onclick="setSnakeColor('#3E4C84'); updateColorButtons()" id="color-3E4C84" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #3E4C84; cursor: pointer;"></button>
                        <button onclick="setSnakeColor('#DA70D6'); updateColorButtons()" id="color-DA70D6" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #DA70D6; cursor: pointer;"></button>
                        <button onclick="setSnakeColor('#87CEEB'); updateColorButtons()" id="color-87CEEB" class="color-btn" style="width: 35px; height: 35px; border: 2px solid #00FF9D; border-radius: 50%; background: #87CEEB; cursor: pointer;"></button>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span style="color: #00FF9D; font-size: 14px;">音效</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div style="display: flex; justify-content: center; width: 100%; max-width: 280px;">
                <button onclick="endGame()" style="background: linear-gradient(135deg, rgba(255, 42, 109, 0.2) 0%, rgba(204, 31, 84, 0.1) 100%); border: 2px solid #FF2A6D; border-radius: 8px; padding: 10px 30px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: #FF2A6D; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(255, 42, 109, 0.2);">结束游戏</button>
            </div>
        </div>

        <div id="pause-screen">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 游戏配置模块
        const GameConfig = {
            INITIAL_SNAKE_LENGTH: 3,
            SNAKE_SPEED: 30,  // 道路移动速度（单位/秒）
            SPEED_INCREMENT: 0.5,  // 速度增量

            SPAWN_Z: -100,  // 生成位置（前方）
            DESPAWN_Z: 30,  // 消失位置（后方）
            APPLE_SCORE: 100,
            INVULNERABILITY_TIME: 500,
            GRID_SIZE: 200,
            SEGMENT_SPACING: 1.0, // 减小蛇块间的间隔
            TRACK_LENGTH: 2000,  // 更长的赛道
            TRACK_SEGMENTS: 40,  // 更多赛道段数
            LATERAL_SPEED: 15,  // 左右移动速度
            // 季节设置
            SEASON_DURATION: 30,  // 每个季节持续30秒，缩短周期
            SEASON_TRANSITION_DURATION: 5,  // 季节切换时间5秒
            SEASON_COLORS: {
                spring: { tree: [0x6BC17A, 0x7ACA8A, 0x8AD09A], ground: 0xffffff },
                summer: { tree: [0x4CAF50, 0x66BB6A, 0x81C784], ground: 0xffffff },
                autumn: { tree: [0xFFB050, 0xFFC070, 0xFFCF80], ground: 0xF5F5DC },
                winter: { tree: [0xF0F8FF, 0xE6F3FF, 0xD9ECFF], ground: 0xFFFFFF }
            }
        };

        // 游戏状态模块
        const GameState = {
            isPlaying: false,
            isPaused: false,
            score: 0,
            distance: 0,
            speed: GameConfig.SNAKE_SPEED,
            snakeLength: GameConfig.INITIAL_SNAKE_LENGTH,
            currentLane: 1,
            targetLane: 1,
            isInvulnerable: false,
            highScore: parseInt(localStorage.getItem('snakeRushHighScore')) || 0,
            soundEnabled: true,
            // 苹果计数器
            appleCount: 0,
            // 季节状态
            currentSeason: 'spring',
            nextSeason: 'summer',
            seasonProgress: 0,
            seasonTime: 0,
            isTransitioning: false,
            transitionProgress: 0,
            // 蛇的外观设置
            snakeShape: 'cube',
            snakeHead: 'truck',
            snakeColor: '#00FF9D'
        };

        // 音频模块
        const AudioManager = {
            audioContext: null,
            bgMusic: null,
            
            init: function() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.createBackgroundMusic();
            },
            
            createBackgroundMusic: function() {
                const playNote = (frequency, startTime, duration, type = 'sine') => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();

                    oscillator.type = type;
                    oscillator.frequency.setValueAtTime(frequency, startTime);

                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.1, startTime + 0.05);
                    gainNode.gain.linearRampToValueAtTime(0, startTime + duration);

                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    oscillator.start(startTime);
                    oscillator.stop(startTime + duration);
                };

                this.bgMusic = {
                    play: function() {
                        if (!GameState.soundEnabled || !AudioManager.audioContext) return;
                        if (AudioManager.audioContext.state === 'suspended') {
                            AudioManager.audioContext.resume();
                        }
                        this.isPlaying = true;
                        this.scheduleNext();
                    },
                    stop: function() {
                        this.isPlaying = false;
                    },
                    isPlaying: false,
                    nextNoteTime: 0,
                    scheduleNext: function() {
                        if (!this.isPlaying) return;

                        const tempo = 120;
                        const secondsPerBeat = 60.0 / tempo;
                        const noteLength = 0.3;

                        while (this.nextNoteTime < AudioManager.audioContext.currentTime + 0.5) {
                            const beat = Math.floor(this.nextNoteTime / secondsPerBeat) % 16;

                            // 简单的电子音乐模式
                            if (beat % 4 === 0) {
                                playNote(110, this.nextNoteTime, noteLength, 'triangle'); // 低音
                            }
                            if (beat % 4 === 2) {
                                playNote(165, this.nextNoteTime, noteLength * 0.5, 'sine');
                            }
                            if (beat % 8 === 7) {
                                playNote(220, this.nextNoteTime, noteLength, 'triangle');
                            }

                            // 随机高音旋律
                            if (beat % 2 === 0 && Math.random() > 0.5) {
                                const notes = [330, 440, 550, 660];
                                playNote(notes[Math.floor(Math.random() * notes.length)], this.nextNoteTime, noteLength * 0.3, 'sine');
                            }

                            this.nextNoteTime += secondsPerBeat / 2;
                        }

                        if (this.isPlaying) {
                            setTimeout(() => this.scheduleNext(), 100);
                        }
                    }
                };
            },
            
            playScoreSound: function() {
                if (!this.audioContext || !GameState.soundEnabled) return;
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1760, this.audioContext.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.2);
            },
            
            playHitSound: function() {
                if (!this.audioContext || !GameState.soundEnabled) return;
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.3);

                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.start();
                oscillator.stop(this.audioContext.currentTime + 0.3);
            }
        };

        // 辅助函数
        function getLaneX(lane) {
            // 4条车道均匀分布在总宽度20的赛道上
            // 车道中心位置：-5.25, -1.75, 1.75, 5.25
            // 初始位置在x=0
            if (!GameState.isPlaying) {
                return 0;
            }
            return -5.25 + lane * GameConfig.LANE_WIDTH;
        }

        // Three.js 变量
        let scene, camera, renderer;
        let snakeHead, snakeBody = [];
        let apples = [], mines = [];
        let trackParts = [];  // 多段赛道
        let railings = [];
        let clock = new THREE.Clock();

        // 路径历史（用于蛇身跟随）
        let pathHistory = [];
        const MAX_PATH_HISTORY = 200;

        // 粒子对象池
        let particlePool = [];
        const MAX_POOL_SIZE = 100;

        function getParticle() {
            if (particlePool.length > 0) {
                const particle = particlePool.pop();
                // 重置粒子属性
                particle.position.set(0, 0, 0);
                particle.rotation.set(0, 0, 0);
                particle.scale.set(1, 1, 1);
                particle.material.opacity = 1;
                particle.userData.velocity.set(0, 0, 0);
                particle.userData.rotationSpeed.set(0, 0, 0);
                particle.userData.life = 1;
                return particle;
            }
            // 创建新粒子
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshBasicMaterial({
                color: 0xFFFFFF,
                transparent: true,
                opacity: 1
            });
            const particle = new THREE.Mesh(geometry, material);
            particle.userData = {
                velocity: new THREE.Vector3(),
                rotationSpeed: new THREE.Vector3(),
                life: 1
            };
            return particle;
        }

        function returnParticle(particle) {
            if (particlePool.length < MAX_POOL_SIZE) {
                scene.remove(particle);
                // 重置粒子属性
                particle.position.set(0, 0, 0);
                particle.rotation.set(0, 0, 0);
                particle.scale.set(1, 1, 1);
                particle.material.opacity = 1;
                particle.userData.velocity.set(0, 0, 0);
                particle.userData.rotationSpeed.set(0, 0, 0);
                particle.userData.life = 1;
                particlePool.push(particle);
            } else {
                scene.remove(particle);
                // 释放材质和几何体
                if (particle.material) {
                    particle.material.dispose();
                }
                if (particle.geometry) {
                    particle.geometry.dispose();
                }
            }
        }

        // 输入状态
        let keys = { left: false, right: false };

        // 上次生成障碍物的时间
        let lastSpawnTime = 0;
        const SPAWN_INTERVAL = 0.3;  // 生成间隔（秒）

        // 初始化
        function init() {
            // 初始化音频上下文（需要用户交互后才能播放）
            AudioManager.init();

            // 场景
            scene = new THREE.Scene();
            // 移除背景颜色，让天空能够显示出来
            // scene.background = new THREE.Color(0x000000);
            // 移除雾效，确保远处的天空能够被看到
            // scene.fog = new THREE.Fog(0x000000, 30, 100);

            // 相机
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 12, 18);
            camera.lookAt(0, 0, -15);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.shadowMap.enabled = false; // 关闭阴影映射
            renderer.autoClear = true;

            // 灯光
            const ambientLight = new THREE.AmbientLight(0x404080, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = false; // 关闭阴影投射
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x00FF9D, 1, 50);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);

            // 创建白色地面（雪地效果）
            const groundGeometry = new THREE.PlaneGeometry(1000, 1000);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                roughness: 0.9, 
                metalness: 0.1 
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -2.0; // 放置在赛道下方
            scene.add(ground);

            // 创建天空背景（带有雪山效果）
            const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
            // 使用蓝白灰色作为天空
            const skyMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xB0C4DE, // 蓝白灰色
                side: THREE.BackSide 
            });
            const sky = new THREE.Mesh(skyGeometry, skyMaterial);
            // 球体不需要特别设置位置，因为它会包围整个场景
            scene.add(sky);

            // 添加雾效果，增强近实远虚的效果
            scene.fog = new THREE.FogExp2(0xB0C4DE, 0.005);

            // 创建远处的小山背景（符合游戏风格）
            const mountainGroup = new THREE.Group();
            
            // 创建几个小山，在雾中若隐若现
            const mountainColors = [0xffffff, 0xf0f0f0, 0xe0e0e0];
            
            for (let i = 0; i < 8; i++) { // 增加小山数量，创建8个
                const height = 30 + Math.random() * 50; // 减小高度范围，变成小山
                const width = 80 + Math.random() * 50; // 减小宽度范围，变成小山
                const geometry = new THREE.ConeGeometry(width, height, 3); // 三角形小山
                const material = new THREE.MeshBasicMaterial({ 
                    color: mountainColors[Math.floor(Math.random() * mountainColors.length)] 
                });
                const mountain = new THREE.Mesh(geometry, material);
                mountain.position.x = -800 + i * 200; // 调整间距
                mountain.position.y = height / 2 + 10; // 调整高度
                mountain.position.z = -800 + Math.random() * 200; // 增加深度，使小山在远处
                mountain.rotation.y = Math.random() * 0.5;
                mountainGroup.add(mountain);
            }
            
            scene.add(mountainGroup);

            // 创建赛道
            createTrack();

            // 创建路边的树
            createTrees();

            // 创建蛇
            createSnake();

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);

            // 触摸事件 - 点击屏幕左侧/右侧移动
            window.addEventListener('touchstart', (e) => {
                if (!GameState.isPlaying || GameState.isPaused) return;
                const touchX = e.touches[0].clientX;
                const screenWidth = window.innerWidth;

                // 点击左侧1/3区域向左，点击右侧1/3区域向右
                if (touchX < screenWidth / 3) {
                    moveLeft();
                } else if (touchX > screenWidth * 2 / 3) {
                    moveRight();
                }
            });

            // 手机端控制按钮事件
            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');

            // 触摸事件
            leftBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleLeftBtn();
            }, { passive: false });

            rightBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleRightBtn();
            }, { passive: false });

            // 鼠标点击事件
            leftBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleLeftBtn();
            });

            rightBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleRightBtn();
            });

            // 开始动画循环
            animate();

            // 场景渲染完成后隐藏加载动画，显示开始游戏页面
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('pause-btn').style.display = 'none';
                document.getElementById('settings-btn').style.display = 'none';
            }, 2000);
        }

        function createTrack() {
            // 创建无缝循环赛道 - 使用两组赛道交替
            const trackWidth = 20;
            const trackDepth = GameConfig.TRACK_LENGTH;
            const segmentDepth = trackDepth / 2; // 分成两段交替
            const laneWidth = 3.5; // 车道宽度设置为3.5

            // 4条车道的不同颜色（更浅）
            const laneColors = [
                0xB8D4E8,  // 车道1 - 浅蓝色
                0xC2E4C8,  // 车道2 - 浅绿色
                0xE8D8C8,  // 车道3 - 浅橙色
                0xD8C8E0   // 车道4 - 浅紫色
            ];

            // 草地颜色
            const grassColor = GRASS_COLORS.spring;

            // 创建两段赛道实现无缝循环
            for (let seg = 0; seg < 2; seg++) {
                // 创建4条不同颜色的车道，稍微重叠以消除缝隙
                for (let lane = 0; lane < 4; lane++) {
                    const laneX = -5.25 + lane * laneWidth; // 车道中心位置：-5.25, -1.75, 1.75, 5.25
                    // 增加车道宽度一点，确保车道之间没有缝隙
                    const roadGeometry = new THREE.PlaneGeometry(laneWidth + 0.01, segmentDepth);
                    const roadMaterial = new THREE.MeshStandardMaterial({
                        color: laneColors[lane],
                        roughness: 0.85,
                        metalness: 0.1
                    });
                    const road = new THREE.Mesh(roadGeometry, roadMaterial);
                    road.rotation.x = -Math.PI / 2;
                    road.position.y = -1.5;
                    road.position.set(laneX, -1.5, -seg * segmentDepth);
                    road.receiveShadow = false;
                    road.renderOrder = 1; // 确保车道在草地之上渲染
                    scene.add(road);
                    trackParts.push(road);
                }

                // 添加车道到草地的过渡效果
                // 左侧过渡 - 增加宽度并向中间靠近
                const leftTransitionGeometry = new THREE.PlaneGeometry(3.5, segmentDepth);
                const leftTransitionMaterial = new THREE.MeshStandardMaterial({
                    color: grassColor,
                    roughness: 0.8,
                    metalness: 0.1,
                    emissive: grassColor,
                    emissiveIntensity: 0.2
                });
                const leftTransition = new THREE.Mesh(leftTransitionGeometry, leftTransitionMaterial);
                leftTransition.rotation.x = -Math.PI / 2;
                leftTransition.position.set(-9.2, -1.35, -seg * segmentDepth); // 调整位置到-9.2，与草地基础对齐
                scene.add(leftTransition);
                trackParts.push(leftTransition);

                // 右侧过渡 - 增加宽度并向中间靠近
                const rightTransitionGeometry = new THREE.PlaneGeometry(3.5, segmentDepth);
                const rightTransitionMaterial = new THREE.MeshStandardMaterial({
                    color: grassColor,
                    roughness: 0.8,
                    metalness: 0.1,
                    emissive: grassColor,
                    emissiveIntensity: 0.2
                });
                const rightTransition = new THREE.Mesh(rightTransitionGeometry, rightTransitionMaterial);
                rightTransition.rotation.x = -Math.PI / 2;
                rightTransition.position.set(9.2, -1.35, -seg * segmentDepth); // 调整位置到9.2，与草地基础对齐
                scene.add(rightTransition);
                trackParts.push(rightTransition);

                // 车道线 - 3条线隔开4个车道
                const lineGeometry = new THREE.PlaneGeometry(0.15, segmentDepth);
                const lineMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.5
                });

                // 车道线位置（3条线划分4条车道，位置：-3.5, 0, 3.5）
                const lanePositions = [-3.5, 0, 3.5];
                lanePositions.forEach(xPos => {
                    const line = new THREE.Mesh(lineGeometry, lineMaterial);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(xPos, -1.49, -seg * segmentDepth); // 稍微高于车道
                    line.visible = true; // 显示车道线
                    line.renderOrder = 2; // 确保车道线在车道之上渲染
                    scene.add(line);
                    trackParts.push(line);
                });
                
                // 添加0车道左边和3车道右边的车道线（与中间车道线宽度一致）
                const wideLineGeometry = new THREE.PlaneGeometry(0.15, segmentDepth); // 与中间车道线宽度一致
                const wideLanePositions = [-8.95, 8.95]; // 0车道左边和3车道右边的位置，与新的草地过渡区域对齐
                wideLanePositions.forEach(xPos => {
                    const line = new THREE.Mesh(wideLineGeometry, lineMaterial);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(xPos, -1.49, -seg * segmentDepth); // 与中间车道线高度一致
                    line.visible = true; // 显示车道线
                    line.renderOrder = 2; // 与中间车道线渲染顺序一致
                    scene.add(line);
                    trackParts.push(line);
                });
            }

            // 移除边界线条，改为使用更自然的过渡效果
            // 这样可以避免边界线与车道之间的隔断感
            // 已经通过过渡区域实现了自然过渡

            // 创建小草
            createGrass();
        }

        function createGrass() {
            const grassColors = [0x6BC17A, 0x7ACA8A, 0x8AD09A];
            const rockColors = [0x8B7355, 0x705D45, 0x5D4B3C];

            // 与赛道分段方式一致，创建两段草地基础
            const trackDepth = GameConfig.TRACK_LENGTH;
            const segmentDepth = trackDepth / 2;

            for (let seg = 0; seg < 2; seg++) {
                // 创建左侧草地基础
                const leftGrassBaseGeometry = new THREE.BoxGeometry(3, 0.3, segmentDepth);
                const leftGrassBaseMaterial = new THREE.MeshStandardMaterial({
                    color: grassColors[0],
                    roughness: 0.8,
                    metalness: 0.1,
                    flatShading: true
                });
                const leftGrassBase = new THREE.Mesh(leftGrassBaseGeometry, leftGrassBaseMaterial);
                leftGrassBase.position.set(-9.2, -1.35, -seg * segmentDepth);
                leftGrassBase.castShadow = false;
                scene.add(leftGrassBase);
                trackParts.push(leftGrassBase);

                // 创建右侧草地基础
                const rightGrassBaseGeometry = new THREE.BoxGeometry(3, 0.3, segmentDepth);
                const rightGrassBaseMaterial = new THREE.MeshStandardMaterial({
                    color: grassColors[0],
                    roughness: 0.8,
                    metalness: 0.1,
                    flatShading: true
                });
                const rightGrassBase = new THREE.Mesh(rightGrassBaseGeometry, rightGrassBaseMaterial);
                rightGrassBase.position.set(9.2, -1.35, -seg * segmentDepth);
                rightGrassBase.castShadow = false;
                scene.add(rightGrassBase);
                trackParts.push(rightGrassBase);
            }

            // 随机添加小草和石头
            const segmentLength = GameConfig.TRACK_LENGTH / GameConfig.TRACK_SEGMENTS;
            for (let j = 0; j < GameConfig.TRACK_SEGMENTS; j++) {
                // 随机决定每段赛道两侧草的数量，使分布更自然
                const leftGrassCount = Math.floor(Math.random() * 10) + 10; // 10-19个
                const rightGrassCount = Math.floor(Math.random() * 10) + 10; // 10-19个

                // 左侧草
                const leftGrassGroup = new THREE.Group();
                const leftXPos = -9.2 + (Math.random() - 0.5) * 1; // 调整到9.2的位置
                for (let i = 0; i < leftGrassCount; i++) {
                    // 随机创建小草或石头
                    if (Math.random() > 0.5) { // 50% 概率创建小草，50% 创建石头
                        // 创建小草
                        const grassGeometry = new THREE.ConeGeometry(0.1, 0.3, 8);
                        const grassMaterial = new THREE.MeshStandardMaterial({
                            color: grassColors[Math.floor(Math.random() * grassColors.length)],
                            flatShading: true
                        });
                        const grassMesh = new THREE.Mesh(grassGeometry, grassMaterial);
                        grassMesh.rotation.y = Math.random() * Math.PI * 2;
                        // 更随机的位置分布
                        const zOffset = -j * segmentLength - Math.random() * segmentLength;
                        const xOffset = leftXPos + (Math.random() - 0.5) * 2.5;
                        grassMesh.position.set(xOffset, -1.2, zOffset);
                        grassMesh.castShadow = false;
                        leftGrassGroup.add(grassMesh);
                    } else { // 50% 概率创建石头
                        // 创建石头，大小不一
                        const rockSize = 0.15 + Math.random() * 0.25; // 大小变化
                        const rockGeometry = new THREE.BoxGeometry(rockSize, rockSize * 0.75, rockSize);
                        const rockMaterial = new THREE.MeshStandardMaterial({
                            color: rockColors[Math.floor(Math.random() * rockColors.length)],
                            flatShading: true
                        });
                        const rock = new THREE.Mesh(rockGeometry, rockMaterial);
                        rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                        // 更随机的位置分布
                        const zOffset = -j * segmentLength - Math.random() * segmentLength;
                        const xOffset = leftXPos + (Math.random() - 0.5) * 2.5;
                        rock.position.set(xOffset, -1.35 + rockSize * 0.375, zOffset);
                        rock.castShadow = false;
                        leftGrassGroup.add(rock);
                    }
                }
                // 设置草组的初始位置
                leftGrassGroup.position.z = -j * segmentLength;
                scene.add(leftGrassGroup);
                grass.push(leftGrassGroup);

                // 右侧草
                const rightGrassGroup = new THREE.Group();
                const rightXPos = 9.2 + (Math.random() - 0.5) * 1; // 调整到9.2的位置
                for (let i = 0; i < rightGrassCount; i++) {
                    // 随机创建小草或石头
                    if (Math.random() > 0.5) { // 50% 概率创建小草，50% 创建石头
                        // 创建小草
                        const grassGeometry = new THREE.ConeGeometry(0.1, 0.3, 8);
                        const grassMaterial = new THREE.MeshStandardMaterial({
                            color: grassColors[Math.floor(Math.random() * grassColors.length)],
                            flatShading: true
                        });
                        const grassMesh = new THREE.Mesh(grassGeometry, grassMaterial);
                        grassMesh.rotation.y = Math.random() * Math.PI * 2;
                        // 更随机的位置分布
                        const zOffset = -j * segmentLength - Math.random() * segmentLength;
                        const xOffset = rightXPos + (Math.random() - 0.5) * 2.5;
                        grassMesh.position.set(xOffset, -1.2, zOffset);
                        grassMesh.castShadow = false;
                        rightGrassGroup.add(grassMesh);
                    } else { // 50% 概率创建石头
                        // 创建石头，大小不一
                        const rockSize = 0.15 + Math.random() * 0.25; // 大小变化
                        const rockGeometry = new THREE.BoxGeometry(rockSize, rockSize * 0.75, rockSize);
                        const rockMaterial = new THREE.MeshStandardMaterial({
                            color: rockColors[Math.floor(Math.random() * rockColors.length)],
                            flatShading: true
                        });
                        const rock = new THREE.Mesh(rockGeometry, rockMaterial);
                        rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                        // 更随机的位置分布
                        const zOffset = -j * segmentLength - Math.random() * segmentLength;
                        const xOffset = rightXPos + (Math.random() - 0.5) * 2.5;
                        rock.position.set(xOffset, -1.35 + rockSize * 0.375, zOffset);
                        rock.castShadow = false;
                        rightGrassGroup.add(rock);
                    }
                }
                // 设置草组的初始位置
                rightGrassGroup.position.z = -j * segmentLength;
                scene.add(rightGrassGroup);
                grass.push(rightGrassGroup);
            }
        }

        // 创建low-poly树 - 使用多面体，3种样式
        function createLowPolyTree(x, z, style, season) {
            const tree = new THREE.Group();
            style = style || Math.floor(Math.random() * 3);
            season = season || GameState.currentSeason;
            // 随机高度缩放（0.3 ~ 1.8倍）- 增大范围使树木大小更自然
            const heightScale = 0.3 + Math.random() * 1.5;

            // 根据季节获取树的颜色
            const seasonColors = GameConfig.SEASON_COLORS[season];
            const crownColors = seasonColors.tree;

            if (style === 0) {
                // 样式1: 多面体树
                const trunkGeometry = new THREE.BoxGeometry(0.4, 1.2, 0.4);
                const trunkMaterial = new THREE.MeshStandardMaterial({
                    color: 0xA07850, roughness: 0.9, metalness: 0.1, flatShading: true
                });
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = 0.6 * heightScale;
                tree.add(trunk);

                const crownSizes = [1.5, 1.2, 0.9];
                const crownHeights = [1.8, 2.6, 3.3];
                for (let i = 0; i < 3; i++) {
                    const crownGeometry = new THREE.IcosahedronGeometry(crownSizes[i] * heightScale, 0);
                    const crownMaterial = new THREE.MeshStandardMaterial({
                        color: crownColors[i % crownColors.length], roughness: 0.8, metalness: 0.1, flatShading: true
                    });
                    const crown = new THREE.Mesh(crownGeometry, crownMaterial);
                    crown.position.y = crownHeights[i] * heightScale;
                    tree.add(crown);
                }
            } else if (style === 1) {
                // 样式2: 八面体树
                const trunkGeometry = new THREE.BoxGeometry(0.35, 1.0, 0.35);
                const trunkMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8B7355, roughness: 0.9, metalness: 0.1, flatShading: true
                });
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = 0.5 * heightScale;
                tree.add(trunk);

                const crownSizes = [1.3, 1.0, 0.7];
                const crownHeights = [1.6, 2.3, 2.9];
                for (let i = 0; i < 3; i++) {
                    const crownGeometry = new THREE.OctahedronGeometry(crownSizes[i] * heightScale, 0);
                    const crownMaterial = new THREE.MeshStandardMaterial({
                        color: crownColors[i % crownColors.length], roughness: 0.8, metalness: 0.1, flatShading: true
                    });
                    const crown = new THREE.Mesh(crownGeometry, crownMaterial);
                    crown.position.y = crownHeights[i] * heightScale;
                    tree.add(crown);
                }
            } else {
                // 样式3: 十二面体树
                const trunkGeometry = new THREE.BoxGeometry(0.3, 0.8, 0.3);
                const trunkMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8B7765, roughness: 0.9, metalness: 0.1, flatShading: true
                });
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = 0.4 * heightScale;
                tree.add(trunk);

                const crownSizes = [1.1, 0.8, 0.5];
                const crownHeights = [1.4, 2.0, 2.5];
                for (let i = 0; i < 3; i++) {
                    const crownGeometry = new THREE.DodecahedronGeometry(crownSizes[i] * heightScale, 0);
                    const crownMaterial = new THREE.MeshStandardMaterial({
                        color: crownColors[i % crownColors.length], roughness: 0.8, metalness: 0.1, flatShading: true
                    });
                    const crown = new THREE.Mesh(crownGeometry, crownMaterial);
                    crown.position.y = crownHeights[i] * heightScale;
                    tree.add(crown);
                }
            }

            tree.position.set(x, -1.35, z);
            return tree;
        }

        // 在赛道两侧创建树木
        function createTrees() {
            const segmentLength = GameConfig.TRACK_LENGTH / GameConfig.TRACK_SEGMENTS;
            const treeSpacing = 30; // 增加间距，减少树的数量

            for (let side = -1; side <= 1; side += 2) {
                const baseXPos = side * 9.2; // 调整到9.2的位置

                for (let i = 0; i < GameConfig.TRACK_LENGTH / treeSpacing + 5; i++) { // 减少树的数量
                    const zPos = -i * treeSpacing;
                    const style = Math.floor(Math.random() * 3);
                    // 减少左右偏移，使树木位置更一致
                    const xOffset = (Math.random() - 0.5) * 1.5; // 减小偏移范围
                    const tree = createLowPolyTree(baseXPos + xOffset, zPos, style, GameState.currentSeason); // 向中间靠近，传入当前季节
                    // 随机旋转
                    tree.rotation.y = Math.random() * Math.PI * 2;
                    scene.add(tree);
                    trees.push(tree);
                }
            }
        }

        // 季节转换函数
        function updateSeason(delta) {
            if (!GameState.isPlaying) return;

            if (GameState.isTransitioning) {
                // 处理季节转换
                GameState.transitionProgress += delta;
                const transitionRatio = Math.min(GameState.transitionProgress / GameConfig.SEASON_TRANSITION_DURATION, 1);

                // 平滑更新树木颜色
                updateTreeColorsDuringTransition(transitionRatio);
                // 平滑更新雾浓度
                updateFogDuringTransition(transitionRatio);
                // 平滑更新草地和车道颜色
                updateEnvironmentColorsDuringTransition(transitionRatio);

                if (transitionRatio >= 1) {
                    // 转换完成
                    GameState.isTransitioning = false;
                    GameState.transitionProgress = 0;
                    GameState.currentSeason = GameState.nextSeason;
                    updateSeasonalEffects();
                }
            } else {
                // 正常季节进程
                GameState.seasonTime += delta;
                GameState.seasonProgress = GameState.seasonTime / GameConfig.SEASON_DURATION;

                // 季节顺序：春 → 夏 → 秋 → 冬 → 春
                const seasons = ['spring', 'summer', 'autumn', 'winter'];
                const currentSeasonIndex = seasons.indexOf(GameState.currentSeason);

                // 检查是否需要开始季节转换
                if (GameState.seasonTime >= GameConfig.SEASON_DURATION) {
                    GameState.seasonTime = 0;
                    GameState.nextSeason = seasons[(currentSeasonIndex + 1) % seasons.length];
                    GameState.isTransitioning = true;
                    // 存储当前树木的颜色，用于平滑过渡
                    storeTreeColors();
                    // 存储当前环境颜色和雾浓度，用于平滑过渡
                    storeEnvironmentState();
                }
            }
        }

        // 存储当前环境状态，用于平滑过渡
        function storeEnvironmentState() {
            // 存储当前雾浓度
            if (scene.fog) {
                GameState.currentFogDensity = scene.fog.density;
            }
            
            // 存储当前草地颜色
            GameState.currentGrassColor = GRASS_COLORS[GameState.currentSeason];
            
            // 存储当前车道颜色
            GameState.currentLaneColors = LANE_COLORS[GameState.currentSeason];
        }

        // 雾浓度配置
        const FOG_DENSITY = {
            spring: 0.01,
            summer: 0.015,
            autumn: 0.02,
            winter: 0.025
        };

        // 草地颜色配置
        const GRASS_COLORS = {
            spring: 0x90EE90,  // 浅绿色
            summer: 0x66BB6A,  // 中绿色（更接近春季颜色）
            autumn: 0xFFF0C0,  // 浅黄色
            winter: 0x87CEEB   // 浅紫蓝
        };

        // 车道颜色配置
        const LANE_COLORS = {
            spring: [
                0xB8D4E8,  // 浅蓝色
                0xC2E4C8,  // 浅绿色
                0xE8D8C8,  // 浅橙色
                0xD8C8E0   // 浅紫色
            ],
            summer: [
                0x87CEEB,  // 蓝色
                0x90EE90,  // 绿色
                0xFFA07A,  // 橙色
                0xDA70D6   // 紫色
            ],
            autumn: [
                0xFFB6C1,  // 浅粉红
                0xFFD700,  // 金色
                0xFFA500,  // 橙色
                0x9370DB   // 紫色
            ],
            winter: [
                0xE0FFFF,  // 浅蓝色
                0xF0F8FF,  // 浅蓝色
                0xE6E6FA,  // 浅紫色
                0xF8F8FF   // 白色
            ]
        };

        // 在季节转换期间平滑更新雾浓度
        function updateFogDuringTransition(ratio) {
            const currentDensity = GameState.currentFogDensity || 0.01;
            const targetDensity = FOG_DENSITY[GameState.nextSeason];
            const newDensity = currentDensity + (targetDensity - currentDensity) * ratio;
            scene.fog = new THREE.FogExp2(0xB0C4DE, newDensity);
        }

        // 在季节转换期间平滑更新环境颜色
        function updateEnvironmentColorsDuringTransition(ratio) {
            // 更新草地颜色
            const currentGrassColor = new THREE.Color(GameState.currentGrassColor || 0x7ACA8A);
            const targetGrassColor = new THREE.Color(GRASS_COLORS[GameState.nextSeason]);
            const newGrassColor = currentGrassColor.lerp(targetGrassColor, ratio);
            
            // 只更新草地颜色，不更新车道颜色
            for (let i = 0; i < trackParts.length; i++) {
                // 更新过渡区域（草地）和草地基础
                if ((i === 4 || i === 5) || (i === 15 || i === 16) || (i >= 22)) { // 22及以后是草地基础
                    trackParts[i].material.color.set(newGrassColor);
                }
            }
            
            // 更新小草颜色
            for (let grassGroup of grass) {
                for (let child of grassGroup.children) {
                    // 只更新小草的颜色，不更新石头
                    if (child.geometry.type === 'ConeGeometry') {
                        child.material.color.set(newGrassColor);
                    }
                }
            }
        }

        // 存储树木当前颜色，用于平滑过渡
        function storeTreeColors() {
            for (let tree of trees) {
                tree.userData.originalColors = [];
                for (let i = 1; i < tree.children.length; i++) { // 跳过树干，从树冠开始
                    const crown = tree.children[i];
                    tree.userData.originalColors.push(crown.material.color.clone());
                }
            }
        }

        // 在季节转换期间平滑更新树木颜色
        function updateTreeColorsDuringTransition(ratio) {
            const currentColors = GameConfig.SEASON_COLORS[GameState.currentSeason].tree;
            const nextColors = GameConfig.SEASON_COLORS[GameState.nextSeason].tree;

            for (let tree of trees) {
                if (tree.userData.originalColors) {
                    for (let i = 1; i < tree.children.length; i++) { // 跳过树干，从树冠开始
                        const crown = tree.children[i];
                        const originalColor = tree.userData.originalColors[i - 1];
                        const targetColor = new THREE.Color(nextColors[(i - 1) % nextColors.length]);
                        
                        // 平滑插值颜色
                        crown.material.color.lerpColors(originalColor, targetColor, ratio);
                    }
                }
            }
        }

        // 更新季节性效果
        function updateSeasonalEffects() {
            // 更新地面颜色
            const ground = scene.children.find(child => child.userData && child.userData.type === 'ground');
            if (ground) {
                ground.material.color.setHex(GameConfig.SEASON_COLORS[GameState.currentSeason].ground);
            }

            // 更新雾浓度
            scene.fog = new THREE.FogExp2(0xB0C4DE, FOG_DENSITY[GameState.currentSeason]);

            // 只更新草地颜色，不更新车道颜色
            const grassColor = new THREE.Color(GRASS_COLORS[GameState.currentSeason]);
            
            // 更新过渡区域（草地）和草地基础
            for (let i = 0; i < trackParts.length; i++) {
                if ((i === 4 || i === 5) || (i === 15 || i === 16) || (i >= 22)) { // 22及以后是草地基础
                    trackParts[i].material.color.set(grassColor);
                }
            }
            
            // 更新小草颜色
            for (let grassGroup of grass) {
                for (let child of grassGroup.children) {
                    // 只更新小草的颜色，不更新石头
                    if (child.geometry.type === 'ConeGeometry') {
                        child.material.color.set(grassColor);
                    }
                }
            }

            // 重置粒子效果 - 先清除所有粒子
            resetParticleSystem();

            // 启动季节性粒子效果
            startSeasonalParticles();
        }

        // 启动季节性粒子效果
        function startSeasonalParticles() {
            // 清除现有季节性粒子
            particles = particles.filter(p => !p.userData.isSeasonal);
            
            // 根据季节启动不同的粒子效果
            switch (GameState.currentSeason) {
                case 'autumn':
                    startAutumnLeaves();
                    break;
                case 'winter':
                    startSnowfall();
                    break;
                case 'spring':
                case 'summer':
                    // 春夏季不启动粒子效果
                    break;
            }
        }

        // 启动秋叶效果
        function startAutumnLeaves() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    createAutumnLeaf();
                }, i * 200);
            }
        }

        // 创建秋叶
        function createAutumnLeaf() {
            const geometry = new THREE.PlaneGeometry(1.8, 1.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xFFD700,
                transparent: true,
                opacity: 1.0
            });
            const leaf = new THREE.Mesh(geometry, material);
            
            // 更分散的随机位置，远离镜头
            leaf.position.x = -20 + Math.random() * 40;
            leaf.position.y = 5 + Math.random() * 10;
            leaf.position.z = -Math.random() * 400 - 50;
            
            // 随机旋转
            leaf.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            
            // 存储速度和生命周期，确保粒子远离镜头
            leaf.userData = {
                isSeasonal: true,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    -0.3 - Math.random() * 0.3,
                    -0.1 - Math.random() * 0.3 // 负速度，远离相机
                ),
                rotationSpeed: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.06,
                    (Math.random() - 0.5) * 0.06,
                    (Math.random() - 0.5) * 0.06
                ),
                life: 1,
                decay: 0.002
            };
            
            scene.add(leaf);
            particles.push(leaf);
        }

        // 启动降雪效果
        function startSnowfall() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createSnowflake();
                }, i * 60);
            }
        }

        // 创建雪花
        function createSnowflake() {
            const geometry = new THREE.SphereGeometry(0.1, 8, 8);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xFFFFFF,
                transparent: true,
                opacity: 1.0
            });
            const snowflake = new THREE.Mesh(geometry, material);
            
            // 更分散的随机位置，远离镜头
            snowflake.position.x = -20 + Math.random() * 40;
            snowflake.position.y = 5 + Math.random() * 10;
            snowflake.position.z = -Math.random() * 400 - 50;
            
            // 存储速度和生命周期，确保粒子远离镜头
            snowflake.userData = {
                isSeasonal: true,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    -0.2 - Math.random() * 0.2,
                    -0.1 - Math.random() * 0.2 // 负速度，远离相机
                ),
                life: 1,
                decay: 0.0015
            };
            
            scene.add(snowflake);
            particles.push(snowflake);
        }

        // 粒子系统
        let particles = [];
        function createParticles(position, color) {
            // 创建增强的粒子效果
            const particleCount = 8;
            const newParticles = [];

            for (let i = 0; i < particleCount; i++) {
                const particle = getParticle();
                particle.position.copy(position);
                particle.material.color.setHex(color);
                particle.material.opacity = 1;
                particle.rotation.set(0, 0, 0);
                
                // 随机大小
                const size = 0.15 + Math.random() * 0.15;
                particle.scale.set(size, size, size);
                
                // 更丰富的速度变化，确保粒子远离镜头
                particle.userData.velocity.set(
                    (Math.random() - 0.5) * 0.4,
                    Math.random() * 0.3 + 0.1,
                    Math.random() * 0.6 + 0.2
                );
                particle.userData.life = 1;
                scene.add(particle);
                newParticles.push(particle);
            }

            // 动画粒子
            function animateParticles() {
                for (let i = newParticles.length - 1; i >= 0; i--) {
                    const p = newParticles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.01;
                    p.userData.life -= 0.02;
                    p.material.opacity = p.userData.life;
                    p.rotation.x += 0.15;
                    p.rotation.y += 0.15;
                    p.rotation.z += 0.1;
                    
                    // 大小变化
                    const scale = p.userData.life * 0.8 + 0.2;
                    p.scale.set(scale, scale, scale);

                    if (p.userData.life <= 0) {
                        returnParticle(p);
                        newParticles.splice(i, 1);
                    }
                }

                if (newParticles.length > 0) {
                    requestAnimationFrame(animateParticles);
                }
            }
            animateParticles();
        }

        // 烟花效果函数
        function createFireworksEffect(position) {
            // 烟花颜色数组
            const colors = [0xFF2A6D, 0x00FF9D, 0xFF9E00, 0x00FFFF, 0xFF69B4, 0xFFFF00];
            const particleCount = 20; // 减少粒子数量
            const particles = [];

            for (let i = 0; i < particleCount; i++) {
                const particle = getParticle();
                particle.position.copy(position);
                
                // 随机选择颜色
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.material.color.setHex(color);
                particle.material.opacity = 1;
                particle.rotation.set(0, 0, 0);
                
                // 随机大小
                const size = 0.1 + Math.random() * 0.2;
                particle.scale.set(size, size, size);
                
                // 烟花爆炸效果 - 向各个方向散开
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.1 + Math.random() * 0.5;
                const speed = 0.3 + Math.random() * 0.3;
                
                particle.userData.velocity.set(
                    Math.cos(angle) * radius * speed,
                    Math.sin(angle) * radius * speed + 0.2, // 向上的初速度
                    Math.random() * 0.5 * speed + 0.1 // 确保粒子远离镜头
                );
                particle.userData.life = 1;
                scene.add(particle);
                particles.push(particle);
            }

            // 动画粒子
            function animateFireworks() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.015; // 重力效果
                    p.userData.life -= 0.015;
                    p.material.opacity = p.userData.life;
                    p.rotation.x += 0.2;
                    p.rotation.y += 0.2;
                    p.rotation.z += 0.1;
                    
                    // 大小变化 - 先膨胀后收缩
                    let scale;
                    if (p.userData.life > 0.7) {
                        scale = (1 - p.userData.life) * 2 + 0.5; // 膨胀
                    } else {
                        scale = p.userData.life * 1.5 + 0.2; // 收缩
                    }
                    p.scale.set(scale, scale, scale);

                    if (p.userData.life <= 0) {
                        returnParticle(p);
                        particles.splice(i, 1);
                    }
                }

                if (particles.length > 0) {
                    requestAnimationFrame(animateFireworks);
                }
            }
            animateFireworks();
        }

        // 更新粒子效果
        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                if (p.userData.isSeasonal) {
                    // 处理季节性粒子（树叶和雪花）
                    p.position.add(p.userData.velocity);
                    
                    // 树叶特有旋转
                    if (p.userData.rotationSpeed) {
                        p.rotation.x += p.userData.rotationSpeed.x;
                        p.rotation.y += p.userData.rotationSpeed.y;
                        p.rotation.z += p.userData.rotationSpeed.z;
                    }
                    
                    // 逐渐消失效果
                    if (p.userData.decay) {
                        p.userData.life -= p.userData.decay;
                        p.material.opacity = p.userData.life;
                    }
                    
                    // 检查是否需要重置（当粒子落地、超出范围或生命周期结束）
                    if (p.position.y < -2 || p.position.z < -500 || p.userData.life <= 0) {
                        // 为了保持效果持续，重新创建粒子
                        if (GameState.currentSeason === 'autumn') {
                            createAutumnLeaf();
                        } else if (GameState.currentSeason === 'winter') {
                            createSnowflake();
                        } else {
                            // 春夏季不创建粒子，直接移除
                        }
                        scene.remove(p);
                        particles.splice(i, 1);
                    }
                } else {
                    // 处理普通粒子
                    p.position.add(p.userData.velocity);
                    p.userData.life -= 0.005;
                    p.material.opacity = p.userData.life;
                    p.rotation.x += 0.05;
                    p.rotation.y += 0.05;

                    if (p.userData.life <= 0 || p.position.z > 50) {
                        returnParticle(p);
                        particles.splice(i, 1);
                    }
                }
            }
        }

        // 重置粒子系统
        function resetParticleSystem() {
            for (let p of particles) {
                if (p.userData.isSeasonal) {
                    scene.remove(p);
                } else {
                    returnParticle(p);
                }
            }
            particles = [];
        }

        function createBodySegment(index, xPosition) {
            const size = 1 - (index * 0.03);
            let geometry;
            
            // 根据蛇身形状创建不同的几何体
            switch(GameState.snakeShape) {
                case 'diamond':
                case 'octahedron':
                    geometry = new THREE.OctahedronGeometry(size * 0.7, 0); // 减小八面体大小
                    break;
                case 'sphere':
                    geometry = new THREE.IcosahedronGeometry(size * 0.5, 1); // 二十面体，细分级别1，减少复杂度
                    break;
                default: // cube
                    geometry = new THREE.BoxGeometry(size, size, size);
            }
            
            const material = new THREE.MeshStandardMaterial({
                color: GameState.snakeColor,
                emissive: GameState.snakeColor,
                emissiveIntensity: 0.3 - (index * 0.02),
                roughness: 0.4,
                metalness: 0.6
            });

            const segment = new THREE.Mesh(geometry, material);
            
            // 直接在蛇头后面的位置生成，而不是在默认位置
            if (snakeHead) {
                segment.position.x = xPosition || snakeHead.position.x;
                segment.position.y = snakeHead.position.y;
                segment.position.z = -(index + 1) * GameConfig.SEGMENT_SPACING; // 负数z值，在蛇头后面

                segment.position.set(xPosition || 0, 0.5, -(index + 1) * GameConfig.SEGMENT_SPACING); // 负数z值，在蛇头后面
            }

            snakeBody.push(segment);
        }

        // 检查位置是否已被占用
        function isPositionOccupied(lane, z, threshold = 2) {
            // 检查苹果
            for (let apple of apples) {
                const appleLane = Math.round(apple.position.x / GameConfig.LANE_WIDTH);
                if (appleLane === lane && Math.abs(apple.position.z - z) < threshold) {
                    return true;
                }
            }
            // 检查地雷
            for (let mine of mines) {
                const mineLane = Math.round(mine.position.x / GameConfig.LANE_WIDTH);
                if (mineLane === lane && Math.abs(mine.position.z - z) < threshold) {
                    return true;
                }
            }
            return false;
        }
